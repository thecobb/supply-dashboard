<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STOCKPILE — Global Supply Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-primary: #0a0c10;
    --bg-secondary: #111318;
    --bg-card: #151820;
    --bg-elevated: #1a1e28;
    --border: #252a36;
    --border-bright: #3a4155;
    --text-primary: #e8ecf4;
    --text-secondary: #8892a8;
    --text-muted: #555f75;
    --accent-green: #00e676;
    --accent-green-dim: #00e67633;
    --accent-red: #ff3d57;
    --accent-red-dim: #ff3d5733;
    --accent-amber: #ffab00;
    --accent-amber-dim: #ffab0033;
    --accent-blue: #448aff;
    --accent-cyan: #00e5ff;
    --accent-purple: #b388ff;
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    --font-sans: 'Instrument Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-mono);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .scanline {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 2px,
      rgba(0, 230, 118, 0.008) 2px, rgba(0, 230, 118, 0.008) 4px
    );
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 4px var(--accent-green-dim); }
    50% { box-shadow: 0 0 16px var(--accent-green-dim); }
  }

  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    animation: fade-up 0.5s ease both;
  }

  .card:hover { border-color: var(--border-bright); }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block;
    animation: pulse-dot 2s ease infinite;
  }

  .sparkline-container { height: 40px; width: 100%; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .ticker-wrap {
    overflow: hidden; white-space: nowrap;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }
  .ticker-inner {
    display: inline-flex;
    animation: ticker-scroll 60s linear infinite;
  }
  .ticker-inner:hover { animation-play-state: paused; }
</style>
</head>
<body>
<div id="root"></div>
<div class="scanline"></div>

<script type="text/babel">

// ─── SEED / DEMO DATA ────────────────────────────────────────
// Realistic seed data based on latest EIA reports (week ending 3/21/2026)
const SEED_DATA = {
  crude_excl_spr: { stocks: 456200, dailyConsumption: 20100, daysOfSupply: 22.7, prevWeekStocks: 449300, fiveYrAvg: 455800, pctVsFiveYr: 0.1, baselineStocks: 439000, baselineDays: 21.8 },
  crude_incl_spr: { stocks: 848600, dailyConsumption: 20100, daysOfSupply: 42.2, prevWeekStocks: 841700, fiveYrAvg: 873400, pctVsFiveYr: -2.8, baselineStocks: 836000, baselineDays: 43.0 },
  gasoline: { stocks: 239800, dailyConsumption: 8940, daysOfSupply: 26.8, prevWeekStocks: 242400, fiveYrAvg: 232700, pctVsFiveYr: 3.1, baselineStocks: 245100, baselineDays: 27.1 },

// Generate 52 weeks of historical data for sparklines
function generateHistory(current, volatility = 0.03) {
  const data = [];
  let val = current * (1 + (Math.random() - 0.3) * 0.15);
  for (let i = 51; i >= 0; i--) {
    val = val * (1 + (Math.random() - 0.48) * volatility);
    const d = new Date();
    d.setDate(d.getDate() - i * 7);
    data.push({ week: d.toISOString().slice(0, 10), value: Math.round(val * 10) / 10 });
  }
  data[data.length - 1].value = current;
  return data;
}

const SEED_HISTORY = {};
Object.keys(SEED_DATA).forEach(k => {
  SEED_HISTORY[k] = generateHistory(SEED_DATA[k].daysOfSupply);
});

// Prices seed
const SEED_PRICES = [

];

// ─── UTILITIES ───────────────────────────────────────────────
function daysSinceBaseline() {
  return Math.floor((Date.now() - CONFLICT_START.getTime()) / (1000 * 60 * 60 * 24));
}

function formatNum(n, decimals = 1) {
  if (n >= 1e6) return (n / 1e6).toFixed(decimals) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(decimals) + 'K';
  return n.toFixed(decimals);
}

function severityLevel(commodities) {
  const criticals = Object.values(commodities).filter(c => {
    const pctFromBase = ((c.daysOfSupply - c.baselineDays) / c.baselineDays) * 100;
    return pctFromBase < -10;
  }).length;
  if (criticals >= 3) return { label: 'CRITICAL', color: 'var(--accent-red)', bg: 'var(--accent-red-dim)' };
  if (criticals >= 1) return { label: 'ELEVATED', color: 'var(--accent-amber)', bg: 'var(--accent-amber-dim)' };
  return { label: 'MONITORED', color: 'var(--accent-green)', bg: 'var(--accent-green-dim)' };
}

// ─── COMPONENTS ──────────────────────────────────────────────

function PriceTicker({ prices }) {
  const items = [...prices, ...prices];
  return (
    <div className="ticker-wrap">
      <div className="ticker-inner">
        {items.map((p, i) => (
          <div key={i} style={{

          }}>

            <span style={{ color: 'var(--text-primary)', fontWeight: 500 }}>
              {typeof p.price === 'number' && p.price > 100 ? p.price.toFixed(0) : p.price.toFixed(p.price < 10 ? 3 : 2)}

        ))}

}

function HeaderBar({ severity, dataTimestamp }) {

          </div>

        </div>
        <div style={{ width: 1, height: 32, background: 'var(--border)' }} />
        <div>
          <div style={{ color: 'var(--text-muted)', fontSize: 9, letterSpacing: 1.5 }}>BASELINE</div>

          <span style={{ color: 'var(--text-muted)', fontSize: 10 }}>LIVE</span>

}

function MiniSparkline({ data, color, height = 36 }) {
  return (
    <ResponsiveContainer width="100%" height={height}>
      <AreaChart data={data} margin={{ top: 2, right: 0, bottom: 0, left: 0 }}>
        <defs>
          <linearGradient id={`grad-${color.replace('#', '')}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity={0.3} />
            <stop offset="100%" stopColor={color} stopOpacity={0} />
          </linearGradient>
        </defs>
        <Area
          type="monotone" dataKey="value"
          stroke={color} strokeWidth={1.5}
          fill={`url(#grad-${color.replace('#', '')})`}
          dot={false} isAnimationActive={false}
        />
      </AreaChart>
    </ResponsiveContainer>
  );
}

function CommodityCard({ config, data, history, index }) {
  if (!data) return null;
  const pctFromBaseline = ((data.daysOfSupply - data.baselineDays) / data.baselineDays * 100);
  const weeklyChange = data.stocks - data.prevWeekStocks;
  const weeklyPct = (weeklyChange / data.prevWeekStocks * 100);

  const isNegative = pctFromBaseline < 0;
  const isCritical = pctFromBaseline < -10;
  const statusColor = isCritical ? 'var(--accent-red)' : isNegative ? 'var(--accent-amber)' : 'var(--accent-green)';

  return (
    <div className="card" style={{ animationDelay: `${index * 60}ms` }}>
      {/* Header */}
      <div style={{
        padding: '12px 16px 8px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',

            <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-primary)' }}>
              {config.name}
            </span>
          </div>
          {config.subtitle && (
            <div style={{ fontSize: 10, color: 'var(--text-muted)', marginLeft: 2 }}>
              {config.subtitle}
            </div>
          )}
        </div>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 4,
          padding: '2px 8px', borderRadius: 3,
          background: isCritical ? 'var(--accent-red-dim)' : isNegative ? 'var(--accent-amber-dim)' : 'var(--accent-green-dim)',
        }}>
          <span style={{ fontSize: 10, fontWeight: 600, color: statusColor }}>
            {pctFromBaseline >= 0 ? '+' : ''}{pctFromBaseline.toFixed(1)}%

        </div>
      </div>

      {/* Days of Supply — Hero Number */}

          DAYS OF SUPPLY
        </div>

          <span style={{
            fontSize: 32, fontWeight: 700, color: statusColor,
            lineHeight: 1,
          }}>
            {data.daysOfSupply.toFixed(1)}
          </span>
          <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>
            / {data.baselineDays.toFixed(1)} pre-war
          </span>
        </div>
      </div>

      {/* Sparkline */}
      <div style={{ padding: '4px 8px 0' }}>
        <MiniSparkline data={history} color={config.color} />
      </div>

      {/* Stats Row */}
      <div style={{
        display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
        padding: '8px 16px 12px',
        gap: 8,
      }}>
        <div>
          <div style={{ fontSize: 9, color: 'var(--text-muted)', letterSpacing: 1 }}>STOCKS</div>
          <div style={{ fontSize: 12, fontWeight: 500 }}>
            {formatNum(data.stocks)} {config.unit}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 9, color: 'var(--text-muted)', letterSpacing: 1 }}>WoW</div>
          <div style={{
            fontSize: 12, fontWeight: 500,
            color: weeklyChange >= 0 ? 'var(--accent-green)' : 'var(--accent-red)',

            {weeklyChange >= 0 ? '+' : ''}{weeklyPct.toFixed(1)}%
          </div>
        </div>
        <div>
          <div style={{ fontSize: 9, color: 'var(--text-muted)', letterSpacing: 1 }}>vs 5YR</div>
          <div style={{
            fontSize: 12, fontWeight: 500,
            color: data.pctVsFiveYr >= 0 ? 'var(--accent-green)' : 'var(--accent-red)',
          }}>

        </div>
      </div>
    </div>

}

function TimeSeriesPanel({ commodities, histories }) {
  const [selected, setSelected] = useState(['gasoline', 'distillate', 'crude_excl_spr', 'jet_fuel']);

  const chartData = useMemo(() => {
    if (!histories || Object.keys(histories).length === 0) return [];
    const weeks = histories[Object.keys(histories)[0]]?.map(d => d.week) || [];
    return weeks.map((week, i) => {
      const point = { week: week.slice(5) };
      selected.forEach(id => {
        if (histories[id] && histories[id][i]) {
          point[id] = histories[id][i].value;
        }
      });
      return point;
    });
  }, [histories, selected]);

  const configs = COMMODITY_CONFIG.filter(c => selected.includes(c.id));

  return (
    <div className="card" style={{ gridColumn: '1 / -1', animationDelay: '500ms' }}>
      <div style={{
        padding: '16px 20px 12px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        borderBottom: '1px solid var(--border)',
      }}>
        <div>
          <span style={{ fontSize: 12, fontWeight: 600, letterSpacing: 1 }}>
            DAYS OF SUPPLY — 52 WEEK TREND
          </span>
        </div>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {COMMODITY_CONFIG.map(c => (
            <button
              key={c.id}
              onClick={() => setSelected(prev =>
                prev.includes(c.id) ? prev.filter(x => x !== c.id) : [...prev, c.id]
              )}
              style={{
                padding: '3px 8px', fontSize: 9, fontWeight: 500,
                borderRadius: 3, cursor: 'pointer',
                fontFamily: 'var(--font-mono)',
                letterSpacing: 0.5,
                border: `1px solid ${selected.includes(c.id) ? c.color + '60' : 'var(--border)'}`,
                background: selected.includes(c.id) ? c.color + '18' : 'transparent',
                color: selected.includes(c.id) ? c.color : 'var(--text-muted)',
              }}
            >
              {c.ticker}
            </button>
          ))}
        </div>
      </div>
      <div style={{ padding: '16px 12px 8px', height: 300 }}>
        <ResponsiveContainer width="100%" height="100%">
          <LineChart data={chartData} margin={{ top: 5, right: 20, bottom: 5, left: 10 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
            <XAxis
              dataKey="week" tick={{ fontSize: 9, fill: 'var(--text-muted)' }}
              axisLine={{ stroke: 'var(--border)' }} tickLine={false}
              interval={7}
            />
            <YAxis
              tick={{ fontSize: 9, fill: 'var(--text-muted)' }}
              axisLine={{ stroke: 'var(--border)' }} tickLine={false}
              label={{ value: 'Days', angle: -90, position: 'insideLeft', style: { fontSize: 9, fill: 'var(--text-muted)' } }}
            />
            <Tooltip
              contentStyle={{
                background: 'var(--bg-elevated)', border: '1px solid var(--border)',
                borderRadius: 4, fontSize: 11, fontFamily: 'var(--font-mono)',
              }}
              labelStyle={{ color: 'var(--text-muted)', fontSize: 10 }}
            />
            {configs.map(c => (
              <Line
                key={c.id} type="monotone" dataKey={c.id}
                stroke={c.color} strokeWidth={1.5}
                dot={false} name={c.name}
                connectNulls
              />
            ))}
          </LineChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function SupplyTable({ commodities }) {
  return (
    <div className="card" style={{ gridColumn: '1 / -1', animationDelay: '600ms' }}>
      <div style={{
        padding: '16px 20px 12px',
        borderBottom: '1px solid var(--border)',
      }}>
        <span style={{ fontSize: 12, fontWeight: 600, letterSpacing: 1 }}>
          DETAILED SUPPLY & DISPOSITION
        </span>
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
          <thead>
            <tr style={{ borderBottom: '1px solid var(--border)' }}>
              {['COMMODITY', 'STOCKS', 'DAILY USE', 'DAYS SUPPLY', 'vs BASELINE', 'vs 5YR AVG', 'WoW Δ'].map(h => (
                <th key={h} style={{
                  padding: '10px 16px', textAlign: 'left',
                  fontSize: 9, fontWeight: 600, letterSpacing: 1.5,
                  color: 'var(--text-muted)',
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {COMMODITY_CONFIG.map((cfg, i) => {
              const d = commodities[cfg.id];
              if (!d) return null;
              const basePct = ((d.daysOfSupply - d.baselineDays) / d.baselineDays * 100);
              const wowPct = ((d.stocks - d.prevWeekStocks) / d.prevWeekStocks * 100);
              return (
                <tr key={cfg.id} style={{
                  borderBottom: '1px solid var(--border)',
                  background: i % 2 === 0 ? 'transparent' : 'var(--bg-secondary)',
                }}>
                  <td style={{ padding: '10px 16px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div style={{ width: 3, height: 20, borderRadius: 2, background: cfg.color }} />
                      <div>
                        <div style={{ fontWeight: 500 }}>{cfg.name}</div>
                        {cfg.subtitle && <div style={{ fontSize: 9, color: 'var(--text-muted)' }}>{cfg.subtitle}</div>}
                      </div>
                    </div>
                  </td>
                  <td style={{ padding: '10px 16px', fontWeight: 500 }}>
                    {formatNum(d.stocks)} {cfg.unit}
                  </td>
                  <td style={{ padding: '10px 16px', color: 'var(--text-secondary)' }}>
                    {formatNum(d.dailyConsumption)} {cfg.unit.replace('M ', 'K ')}
                  </td>
                  <td style={{ padding: '10px 16px', fontWeight: 700, fontSize: 13 }}>
                    {d.daysOfSupply.toFixed(1)}d
                  </td>
                  <td style={{ padding: '10px 16px' }}>
                    <span style={{
                      color: basePct >= 0 ? 'var(--accent-green)' : basePct > -5 ? 'var(--accent-amber)' : 'var(--accent-red)',
                      fontWeight: 600,
                    }}>
                      {basePct >= 0 ? '+' : ''}{basePct.toFixed(1)}%
                    </span>
                  </td>
                  <td style={{ padding: '10px 16px' }}>
                    <span style={{
                      color: d.pctVsFiveYr >= 0 ? 'var(--accent-green)' : 'var(--accent-red)',
                      fontWeight: 500,
                    }}>
                      {d.pctVsFiveYr >= 0 ? '+' : ''}{d.pctVsFiveYr.toFixed(1)}%
                    </span>
                  </td>
                  <td style={{ padding: '10px 16px' }}>
                    <span style={{
                      color: wowPct >= 0 ? 'var(--accent-green)' : 'var(--accent-red)',
                      fontWeight: 500,
                    }}>
                      {wowPct >= 0 ? '▲' : '▼'} {Math.abs(wowPct).toFixed(1)}%
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  const [commodities, setCommodities] = useState(SEED_DATA);
  const [histories, setHistories] = useState(SEED_HISTORY);
  const [prices, setPrices] = useState(SEED_PRICES);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('eia_api_key') || '');
  const [loading, setLoading] = useState(false);
  const [dataTimestamp, setDataTimestamp] = useState('2026-03-21 (seed)');
  const [error, setError] = useState(null);

  useEffect(() => {
    if (apiKey) localStorage.setItem('eia_api_key', apiKey);
  }, [apiKey]);

  // Try loading from data/latest.json (GitHub Actions pre-fetched)
  useEffect(() => {
    fetch('data/latest.json')
      .then(r => { if (r.ok) return r.json(); throw new Error('No pre-fetched data'); })
      .then(data => {
        if (data.commodities) setCommodities(data.commodities);
        if (data.histories) setHistories(data.histories);
        if (data.prices) setPrices(data.prices);
        if (data.timestamp) setDataTimestamp(data.timestamp);
      })
      .catch(() => {
        // Fall back to seed data — that's fine
      });
  }, []);

  const fetchLiveData = useCallback(async () => {
    if (!apiKey) return;
    setLoading(true);
    setError(null);

    try {
      const results = {};
      const stockConfigs = COMMODITY_CONFIG.filter(c => !c.isNatGas);

      // Fetch stocks for all petroleum products
      for (const cfg of stockConfigs) {
        try {
          const facetParams = Object.entries(cfg.facets)
            .map(([k, vals]) => vals.map(v => `facets[${k}][]=${v}`).join('&'))
            .join('&');

          const stockUrl = `${EIA_BASE}/${cfg.apiPath}?api_key=${apiKey}&frequency=weekly&data[]=value&${facetParams}&facets[duoarea][]=NUS&sort[0][column]=period&sort[0][direction]=desc&length=60`;

          const stockResp = await fetch(stockUrl);
          const stockJson = await stockResp.json();

          if (stockJson.response && stockJson.response.data && stockJson.response.data.length > 0) {
            const latestStocks = parseFloat(stockJson.response.data[0].value);
            const prevStocks = stockJson.response.data.length > 1 ? parseFloat(stockJson.response.data[1].value) : latestStocks;
            const timestamp = stockJson.response.data[0].period;

            // Also fetch product supplied for days-of-supply calculation
            const consFacetParams = Object.entries(cfg.consumptionFacets)
              .map(([k, vals]) => vals.map(v => `facets[${k}][]=${v}`).join('&'))
              .join('&');

            const consUrl = `${EIA_BASE}/${cfg.consumptionPath}?api_key=${apiKey}&frequency=weekly&data[]=value&${consFacetParams}&facets[duoarea][]=NUS&sort[0][column]=period&sort[0][direction]=desc&length=5`;

            let dailyUse = SEED_DATA[cfg.id]?.dailyConsumption || 1;
            try {
              const consResp = await fetch(consUrl);
              const consJson = await consResp.json();
              if (consJson.response?.data?.length > 0) {
                const weeklySupplied = parseFloat(consJson.response.data[0].value);
                dailyUse = weeklySupplied / 7;
              }
            } catch (e) { /* use seed fallback */ }

            const daysOfSupply = latestStocks / dailyUse;

            // Build history from returned data
            const hist = stockJson.response.data
              .slice(0, 52)
              .reverse()
              .map(d => ({
                week: d.period,
                value: Math.round((parseFloat(d.value) / dailyUse) * 10) / 10,
              }));

            results[cfg.id] = {
              stocks: latestStocks,
              dailyConsumption: dailyUse,
              daysOfSupply: daysOfSupply,
              prevWeekStocks: prevStocks,
              fiveYrAvg: SEED_DATA[cfg.id]?.fiveYrAvg || latestStocks,
              pctVsFiveYr: SEED_DATA[cfg.id]?.pctVsFiveYr || 0,
              baselineStocks: SEED_DATA[cfg.id]?.baselineStocks || latestStocks,
              baselineDays: SEED_DATA[cfg.id]?.baselineDays || daysOfSupply,
              _timestamp: timestamp,
              _history: hist,
            };

            setDataTimestamp(timestamp);
          }
        } catch (e) {
          console.warn(`Failed to fetch ${cfg.id}:`, e);
        }
      }

      // Natural gas storage
      try {
        const ngUrl = `${EIA_BASE}/natural-gas/stor/wkly/data/?api_key=${apiKey}&frequency=weekly&data[]=value&facets[process][]=SAY&sort[0][column]=period&sort[0][direction]=desc&length=60`;
        const ngResp = await fetch(ngUrl);
        const ngJson = await ngResp.json();
        if (ngJson.response?.data?.length > 0) {
          const latestNg = parseFloat(ngJson.response.data[0].value);
          const prevNg = ngJson.response.data.length > 1 ? parseFloat(ngJson.response.data[1].value) : latestNg;
          const dailyUse = SEED_DATA.natgas.dailyConsumption;

          results.natgas = {
            stocks: latestNg,
            dailyConsumption: dailyUse,
            daysOfSupply: latestNg / dailyUse,
            prevWeekStocks: prevNg,
            fiveYrAvg: SEED_DATA.natgas.fiveYrAvg,
            pctVsFiveYr: ((latestNg - SEED_DATA.natgas.fiveYrAvg) / SEED_DATA.natgas.fiveYrAvg * 100),
            baselineStocks: SEED_DATA.natgas.baselineStocks,
            baselineDays: SEED_DATA.natgas.baselineDays,
            _history: ngJson.response.data.slice(0, 52).reverse().map(d => ({
              week: d.period,
              value: Math.round((parseFloat(d.value) / dailyUse) * 10) / 10,
            })),
          };
        }
      } catch (e) {
        console.warn('Failed to fetch natural gas:', e);
      }

      // Spot prices
      try {
        const priceUrl = `${EIA_BASE}/petroleum/pri/spt/data/?api_key=${apiKey}&frequency=daily&data[]=value&sort[0][column]=period&sort[0][direction]=desc&length=20`;
        const priceResp = await fetch(priceUrl);
        const priceJson = await priceResp.json();
        // Process prices if available
      } catch (e) { /* use seed prices */ }

      // Merge results
      if (Object.keys(results).length > 0) {
        setCommodities(prev => ({ ...prev, ...Object.fromEntries(
          Object.entries(results).map(([k, v]) => {
            const { _timestamp, _history, ...rest } = v;
            return [k, rest];
          })
        )}));

        // Update histories
        const newHistories = {};
        Object.entries(results).forEach(([k, v]) => {
          if (v._history && v._history.length > 5) {
            newHistories[k] = v._history;
          }
        });
        if (Object.keys(newHistories).length > 0) {
          setHistories(prev => ({ ...prev, ...newHistories }));
        }
      }
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [apiKey]);

  const severity = useMemo(() => severityLevel(commodities), [commodities]);

  return (
    <div>
      <PriceTicker prices={prices} />
      <HeaderBar severity={severity} dataTimestamp={dataTimestamp} />

      {error && (
        <div style={{
          margin: '12px 24px 0', padding: '10px 16px',
          background: 'var(--accent-red-dim)', border: '1px solid var(--accent-red)',
          borderRadius: 4, fontSize: 11, color: 'var(--accent-red)',
        }}>
          Error: {error}
        </div>
      )}

      <main style={{ padding: '20px 24px 40px' }}>
        {/* Commodity Cards Grid */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
          gap: 12,
          marginBottom: 16,
        }}>
          {COMMODITY_CONFIG.map((cfg, i) => (
            <CommodityCard
              key={cfg.id}
              config={cfg}
              data={commodities[cfg.id]}
              history={histories[cfg.id] || []}
              index={i}
            />
          ))}
        </div>

        {/* Time Series */}
        <div style={{ marginBottom: 16 }}>
          <TimeSeriesPanel commodities={commodities} histories={histories} />
        </div>

        {/* Supply Table */}
        <div style={{ marginBottom: 16 }}>
          <SupplyTable commodities={commodities} />
        </div>

        {/* API Key Input */}
        <div style={{ marginBottom: 16 }}>
          <ApiKeyPanel
            apiKey={apiKey}
            setApiKey={setApiKey}
            onFetch={fetchLiveData}
            loading={loading}
          />
        </div>

        {/* Sources */}
        <SourcesPanel />

        {/* Footer */}
        <div style={{
          marginTop: 24, textAlign: 'center',
          fontSize: 10, color: 'var(--text-muted)',
          fontFamily: 'var(--font-sans)',
          lineHeight: 1.8,
        }}>
          <div>STOCKPILE v1.0 — Global Supply Monitor</div>
          <div>Data: U.S. Energy Information Administration (EIA) API v2 — public domain</div>
          <div>
            Inspired by{' '}
            <a href="https://x.com/DanielleFong/status/1905377285422743622" target="_blank" rel="noopener"
              style={{ color: 'var(--accent-blue)', textDecoration: 'none' }}>
              @DanielleFong
            </a>{' '}
            — Deploy with{' '}
            <a href="https://github.com" target="_blank" rel="noopener"
              style={{ color: 'var(--accent-blue)', textDecoration: 'none' }}>
              GitHub Pages + Actions
            </a>
          </div>
          <div style={{ marginTop: 4 }}>
            Days of Supply = Ending Stocks ÷ (Product Supplied ÷ 7) · Updated weekly (Wed ~10:30 ET)
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
